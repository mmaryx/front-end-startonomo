<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/edit-profile.css">
    <title>Editar perfil | Startônomo</title>
</head>
<body>
    <nav class="nav">
        <section class="nav-bar">
            <figure class="startonomo">
               <a href="home-page.html"><img src="../img/logo.png" alt="Startônomo"></a>
            </figure>

            <section class="side-menu">
                <input type="checkbox" class="menu-faketrigger">
                <article class="exp-btn">
                    <i class="bi bi-list" id="menu-icon"></i>
                </article>
                <ul class="menu-ul">
                    <li class="menu">
                        <a href="#">
                            <span class="icon"><i class="bi bi-house-door-fill"></i></span>
                            <span class="link-text">Início</span>
                        </a>
                    </li>
                    <li class="menu">
                        <a href="#">
                            <span class="icon"><i class="bi bi-person-fill"></i></span>
                            <span class="link-text">Perfil</span>
                        </a>
                    </li>
                    <li class="menu">
                        <a href="#">
                            <span class="icon"><i class="bi bi-list-ul"></i></span>
                            <span class="link-text">Categorias</span> <!--remover isso na visão de autonomo -->
                        </a>
                    </li>
                </ul>
            </section>

            <ul class="nav-links">
                <li><a href="#">Início</a></li>
                <li><a href="#">Perfil</a></li>
                <li><a href="#">Categorias</a></li> <!--remover isso na visão de autonomo -->
            </ul>
        </section>
        
        <section class="name">
            <h1>STARTÔNOMO</h1>
        </section>

        <aside class="aside-nav">
            <form class="search-bar">
                <input type="text" name="" id="" placeholder="Search..">
                <button type="submit" id="search-icon">
                    <img src="../img/search-icon.png">
                </button>
                <button type="button" class="none">
                    <img src="../img/search-icon.png">
                </button>
            </form>
        </aside>
    </nav>

    <main class="container">
        <form action="#" method="post">
            <header class="form-header">
                <div class="form-title">
                    <h1 class="title">Editar perfil</h1>
                </div>
                <div class="image">
                    <img src="../img/woman.png" width="130px">
                    <p>Alterar imagem</p>
                </div>
            </header>
            <article class="input-group">
                <div class="group1">
                    <div class="input-box">
                        <input type="text" id="firstname" placeholder="Primeiro Nome" required>
                    </div>
                    <div class="input-box">
                        <input type="text" id="lastname" placeholder="Último Nome" required>
                    </div>
                </div>
                <div class="group2">
                    <div class="input-box">
                        <input type="tel" id="tel" maxlength="15" placeholder="Celular" required>
                    </div>
                    <div class="input-box">
                        <input type="email" placeholder="E-mail" required>
                    </div>
                    <div class="input-box">
                        <input type="text" id="cep" maxlength="9" placeholder="CEP" required>
                    </div>
                    <div class="input-box">
                        <input type="password" id="password" placeholder="Senha" required>
                    </div>
                </div>    
                <div class="group3">
                    <div class="input-box">
                        <select class="custom-select">
                            <option value="" >Área de atuação</option>
                            <option value="op1">Pintura</option>
                            <option value="op2">Elétrica</option>
                            <option value="op3">Limpeza</option>
                            <option value="op4">Mecânica</option>
                            <option value="op5">Construção</option>
                        </select>
                    </div>
                    <div class="input-box">
                        <input type="text" name="" placeholder="Região de atendimento">
                    </div>
                </div>
            </article>
                
            <div class="submit-button">
                <input type="submit" value="Salvar" id="submit-button">
            </div>
        </form>

    </main>
</body>
</html>
